<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dante's Inferno — Canto I</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg: #1a1410;
    --surface: #231e18;
    --surface-hover: #2d261e;
    --text: #e8dcc8;
    --text-muted: #9a8b75;
    --accent: #c4956a;
    --accent-glow: #e8b888;
    --highlight-it: rgba(196, 149, 106, 0.35);
    --highlight-en: rgba(196, 149, 106, 0.25);
    --highlight-active: rgba(232, 184, 136, 0.5);
    --border: #3a3228;
    --scrollbar: #4a3e32;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
    overflow: hidden;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    z-index: 10;
    position: relative;
  }

  .title {
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .title span {
    color: var(--text-muted);
    font-weight: 400;
    font-size: 1.1rem;
    margin-left: 12px;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .play-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    background: transparent;
    color: var(--accent);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    position: relative;
  }

  .play-btn:hover {
    background: var(--accent);
    color: var(--bg);
  }

  .play-btn svg {
    width: 20px;
    height: 20px;
    fill: currentColor;
  }

  .play-btn.playing {
    border-color: var(--accent-glow);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(196, 149, 106, 0.3); }
    50% { box-shadow: 0 0 12px 4px rgba(196, 149, 106, 0.15); }
  }

  .speed-btn {
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    padding: 4px 10px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .speed-btn:hover, .speed-btn.active {
    border-color: var(--accent);
    color: var(--accent);
  }

  .progress-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 2px;
    background: var(--accent);
    transition: width 0.3s linear;
  }

  .container {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 81px);
  }

  .column-headers {
    display: flex;
    gap: 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    z-index: 5;
    flex-shrink: 0;
    padding: 0 32px 0 120px;
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
  }

  .column-header {
    flex: 0 1 420px;
    font-family: 'Inter', sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    padding: 12px 0;
  }

  .column-header + .column-header {
    padding-left: 24px;
    border-left: 1px solid var(--border);
    flex: 1 1 auto;
  }

  .scroll-viewport {
    flex: 1;
    overflow-y: auto;
    scroll-behavior: smooth;
    padding: 0 0 200px 0;
  }

  .scroll-viewport::-webkit-scrollbar {
    width: 6px;
  }

  .scroll-viewport::-webkit-scrollbar-track {
    background: transparent;
  }

  .scroll-viewport::-webkit-scrollbar-thumb {
    background: var(--scrollbar);
    border-radius: 3px;
  }

  .stanza-row {
    display: flex;
    gap: 24px;
    border-bottom: 1px solid rgba(58, 50, 40, 0.5);
    transition: background 0.3s;
    padding: 20px 32px 20px 120px;
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
  }

  .stanza-row.active {
    background: rgba(196, 149, 106, 0.05);
  }

  .stanza {
    flex: 0 1 420px;
    position: relative;
  }

  .stanza.english {
    border-left: 1px solid var(--border);
    padding-left: 24px;
    flex: 1 1 auto;
  }

  .stanza-number {
    font-family: 'Inter', sans-serif;
    font-size: 0.65rem;
    color: var(--text-muted);
    opacity: 0.5;
    position: absolute;
    left: -48px;
    top: 2px;
  }

  .stanza-play {
    position: absolute;
    left: -30px;
    top: 50%;
    transform: translateY(-50%);
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: all 0.2s;
  }

  .stanza-row:hover .stanza-play {
    opacity: 0.4;
  }

  .stanza-play:hover {
    opacity: 1 !important;
    border-color: var(--accent);
    color: var(--accent);
  }

  .stanza-play svg {
    width: 10px;
    height: 10px;
    fill: currentColor;
  }

  .line {
    font-size: 1.25rem;
    line-height: 1.8;
    padding-left: 20px;
  }

  .italian .line {
    font-style: normal;
  }

  .word {
    cursor: pointer;
    padding: 1px 2px;
    border-radius: 3px;
    transition: background 0.15s, color 0.15s;
    position: relative;
  }

  .word:hover {
    background: var(--highlight-it);
  }

  .word.highlighted {
    background: var(--highlight-it);
    color: var(--accent-glow);
  }

  .word.speaking {
    background: var(--highlight-active);
    color: var(--accent-glow);
    font-weight: 600;
  }

  .word.pair-highlight {
    background: var(--highlight-en);
    color: var(--accent);
  }

  .tooltip {
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 0.9rem;
    pointer-events: none;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.15s;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    white-space: nowrap;
  }

  .tooltip .it-text {
    font-style: italic;
    color: var(--accent);
  }

  .tooltip .en-text {
    color: var(--text-muted);
    margin-left: 8px;
  }

  .tooltip.visible {
    opacity: 1;
  }

  .punct {
    cursor: default;
  }
</style>
</head>
<body>

<div class="header">
  <div class="title">Inferno <span>Canto I</span></div>
  <div class="controls">
    <button class="speed-btn" data-speed="0.8">0.8x</button>
    <button class="speed-btn active" data-speed="1">1x</button>
    <button class="speed-btn" data-speed="1.2">1.2x</button>
    <button class="play-btn" id="playBtn" title="Play / Pause">
      <svg class="play-icon" viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
      <svg class="pause-icon" viewBox="0 0 24 24" style="display:none"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>
    </button>
  </div>
  <div class="progress-bar" id="progressBar"></div>
</div>

<div class="container">
  <div class="column-headers">
    <div class="column-header">Italiano</div>
    <div class="column-header">English</div>
  </div>
  <div class="scroll-viewport" id="mainScroll"></div>
</div>

<div class="tooltip" id="tooltip"></div>

// State
let isPlaying = false;
let currentStanza = 0;
let currentWordIndex = -1;
let speechRate = 1;
let utterance = null;
let wordElements = { it: [], en: [] }; // [stanza][wordIndex]
let itToEnMaps = []; // [stanza] -> { itWordIdx: [enWordIdx, ...] }
let enToItMap = [];  // [stanza] -> { enWordIdx: itWordIdx }

// Audio state for ElevenLabs (Web Audio API for precise timing)
let audioCtx = null;
let audioBuffer = null; // decoded AudioBuffer
let audioSource = null; // current BufferSourceNode
let audioTimings = null; // word-level timing data
let audioLoaded = false;
let trackingGen = 0; // generation counter to cancel stale tracking loops
let audioStartCtxTime = 0; // audioCtx.currentTime when playback started
let audioStartOffset = 0; // offset into buffer when playback started
let audioPausedAt = -1; // buffer offset where we paused (-1 = not paused)

const playBtn = document.getElementById('playBtn');
const playIcon = playBtn.querySelector('.play-icon');
const pauseIcon = playBtn.querySelector('.pause-icon');
const progressBar = document.getElementById('progressBar');
const tooltip = document.getElementById('tooltip');
const mainScroll = document.getElementById('mainScroll');

function getAudioTime() {
  if (audioPausedAt >= 0) return audioPausedAt;
  if (!audioCtx || !audioSource) return 0;
  return audioStartOffset + (audioCtx.currentTime - audioStartCtxTime) * speechRate;
}

// Try to load ElevenLabs audio via Web Audio API
function initAudio() {
  fetch('canto1.mp3')
    .then(r => r.ok ? r.arrayBuffer() : Promise.reject())
    .then(data => {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx.decodeAudioData(data);
    })
    .then(buffer => {
      audioBuffer = buffer;
      audioLoaded = true;
    })
    .catch(() => { audioLoaded = false; });

  fetch('canto1_timing.json')
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(data => { audioTimings = data; })
    .catch(() => { audioTimings = null; });
}
initAudio();

// Build DOM
function buildStanzas() {
  wordElements = { it: [], en: [] };

  STANZAS.forEach((s, si) => {
    const row = document.createElement('div');
    row.className = 'stanza-row';
    row.dataset.stanza = si;

    const itDiv = document.createElement('div');
    itDiv.className = 'stanza italian';
    itDiv.dataset.stanza = si;

    const enDiv = document.createElement('div');
    enDiv.className = 'stanza english';
    enDiv.dataset.stanza = si;

    // Stanza number
    const numIt = document.createElement('div');
    numIt.className = 'stanza-number';
    numIt.textContent = s.stanza;
    itDiv.appendChild(numIt);

    // Stanza play button (only on Italian side)
    const playBtnIt = document.createElement('button');
    playBtnIt.className = 'stanza-play';
    playBtnIt.innerHTML = '<svg viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>';
    playBtnIt.onclick = (e) => { e.stopPropagation(); startFromStanza(si); };
    itDiv.appendChild(playBtnIt);

    wordElements.it[si] = [];
    wordElements.en[si] = [];

    // Build lines with word spans
    s.italian.forEach((line, li) => {
      const lineDiv = document.createElement('div');
      lineDiv.className = 'line';
      const words = tokenizeLine(line);
      words.forEach(token => {
        if (token.isWord) {
          const span = document.createElement('span');
          span.className = 'word';
          span.textContent = token.text;
          const wIdx = wordElements.it[si].length;
          span.dataset.stanza = si;
          span.dataset.wordIdx = wIdx;
          span.dataset.side = 'it';
          wordElements.it[si].push(span);
          lineDiv.appendChild(span);
        } else {
          const span = document.createElement('span');
          span.className = 'punct';
          span.textContent = token.text;
          lineDiv.appendChild(span);
        }
      });
      itDiv.appendChild(lineDiv);
    });

    // English side
    let enWordIdx = 0;
    s.english.forEach((line, li) => {
      const lineDiv = document.createElement('div');
      lineDiv.className = 'line';
      const words = tokenizeLine(line);
      words.forEach(token => {
        if (token.isWord) {
          const span = document.createElement('span');
          span.className = 'word';
          span.textContent = token.text;
          const wIdx = wordElements.en[si].length;
          span.dataset.stanza = si;
          span.dataset.wordIdx = wIdx;
          span.dataset.side = 'en';
          wordElements.en[si].push(span);
          lineDiv.appendChild(span);
        } else {
          const span = document.createElement('span');
          span.className = 'punct';
          span.textContent = token.text;
          lineDiv.appendChild(span);
        }
      });
      enDiv.appendChild(lineDiv);
    });

    row.appendChild(itDiv);
    row.appendChild(enDiv);
    mainScroll.appendChild(row);
  });

  // Build Italian->English word index maps
  itToEnMaps = [];
  STANZAS.forEach((s, si) => {
    const map = s.wordMap;
    const enWords = wordElements.en[si].map(el => el.textContent.toLowerCase());
    const claimed = new Set();
    const itToEn = {};

    for (let itIdx = 0; itIdx < map.length; itIdx++) {
      const enVal = map[itIdx].en.toLowerCase();
      const enIndices = [];
      const expectedPos = (itIdx / map.length) * enWords.length;

      // Try exact match first (for hyphenated compounds like 'in-the')
      let exactIdx = -1;
      let exactDist = Infinity;
      for (let ei = 0; ei < enWords.length; ei++) {
        if (claimed.has(ei)) continue;
        if (enWords[ei] === enVal) {
          const dist = Math.abs(ei - expectedPos);
          if (dist < exactDist) {
            exactDist = dist;
            exactIdx = ei;
          }
        }
      }

      if (exactIdx >= 0) {
        enIndices.push(exactIdx);
        claimed.add(exactIdx);
      } else {
        // Fall back to splitting on hyphens
        const parts = enVal.split('-');
        for (const part of parts) {
          let bestIdx = -1;
          let bestDist = Infinity;
          for (let ei = 0; ei < enWords.length; ei++) {
            if (claimed.has(ei)) continue;
            if (enWords[ei] === part) {
              const dist = Math.abs(ei - expectedPos);
              if (dist < bestDist) {
                bestDist = dist;
                bestIdx = ei;
              }
            }
          }
          if (bestIdx >= 0) {
            enIndices.push(bestIdx);
            claimed.add(bestIdx);
          }
        }
      }

      itToEn[itIdx] = enIndices;
    }

    itToEnMaps.push(itToEn);
  });

  // Build reverse map: English word index -> Italian wordMap index
  enToItMap = [];
  itToEnMaps.forEach((itToEn, si) => {
    const reverse = {};
    for (const [itIdx, enIndices] of Object.entries(itToEn)) {
      for (const ei of enIndices) {
        reverse[ei] = parseInt(itIdx);
      }
    }
    enToItMap.push(reverse);
  });
}

function tokenizeLine(line) {
  const tokens = [];
  let i = 0;
  while (i < line.length) {
    if (/[\s,;:.!?\u00ab\u00bb\u2018\u2019\u201c\u201d]/.test(line[i]) && !/['\u2019]/.test(line[i])) {
      let punct = '';
      while (i < line.length && /[\s,;:.!?\u00ab\u00bb\u2018\u2019\u201c\u201d]/.test(line[i]) && !/['\u2019]/.test(line[i])) {
        punct += line[i]; i++;
      }
      tokens.push({ text: punct, isWord: false });
    } else {
      let word = '';
      while (i < line.length && !/[\s,;:.!?\u00ab\u00bb\u2018\u2019\u201c\u201d]/.test(line[i]) || (i < line.length && /['\u2019]/.test(line[i]))) {
        // Include apostrophes as part of words
        if (/[,;:.!?]/.test(line[i])) break;
        word += line[i]; i++;
      }
      if (word) tokens.push({ text: word, isWord: true });
    }
  }
  return tokens;
}

// Hover handling
function getMapIdx(si, wi, side) {
  // For Italian words, DOM index = wordMap index (1:1)
  // For English words, use reverse map to find the Italian wordMap index
  if (side === 'it') {
    return Math.min(wi, STANZAS[si].wordMap.length - 1);
  } else {
    const itIdx = enToItMap[si] && enToItMap[si][wi];
    return itIdx !== undefined ? itIdx : -1;
  }
}

function handleWordHover(e) {
  const el = e.target;
  if (!el.classList.contains('word')) return;

  const si = parseInt(el.dataset.stanza);
  const wi = parseInt(el.dataset.wordIdx);
  const side = el.dataset.side;
  const map = STANZAS[si].wordMap;

  const mapIdx = getMapIdx(si, wi, side);
  if (mapIdx < 0) return;

  // Always show tooltip
  if (mapIdx < map.length) {
    tooltip.innerHTML = `<span class="it-text">${map[mapIdx].it}</span><span class="en-text">${map[mapIdx].en}</span>`;
    tooltip.classList.add('visible');
    positionTooltip(e);
  }

  // Highlight paired words
  clearHighlights();
  el.classList.add('highlighted');

  if (side === 'it') {
    const enIndices = itToEnMaps[si] && itToEnMaps[si][mapIdx];
    if (enIndices) {
      enIndices.forEach(ei => {
        if (wordElements.en[si] && wordElements.en[si][ei]) {
          wordElements.en[si][ei].classList.add('pair-highlight');
        }
      });
    }
  } else {
    if (wordElements.it[si] && wordElements.it[si][mapIdx]) {
      wordElements.it[si][mapIdx].classList.add('pair-highlight');
    }
  }
}

function handleWordLeave(e) {
  if (!e.target.classList.contains('word')) return;
  clearHighlights();
  tooltip.classList.remove('visible');
}

function positionTooltip(e) {
  tooltip.style.left = (e.clientX + 12) + 'px';
  tooltip.style.top = (e.clientY - 32) + 'px';
}

document.addEventListener('mousemove', (e) => {
  if (tooltip.classList.contains('visible')) {
    positionTooltip(e);
  }
});

function clearHighlights() {
  document.querySelectorAll('.word.highlighted, .word.pair-highlight').forEach(el => {
    el.classList.remove('highlighted', 'pair-highlight');
  });
}

// Click to read single word
function handleWordClick(e) {
  const el = e.target;
  if (!el.classList.contains('word') || isPlaying) return;

  const si = parseInt(el.dataset.stanza);
  const wi = parseInt(el.dataset.wordIdx);
  const side = el.dataset.side;
  const map = STANZAS[si].wordMap;
  const mapIdx = getMapIdx(si, wi, side);
  if (mapIdx < 0 || mapIdx >= map.length) return;

  const italianWord = map[mapIdx].it;
  speakWord(italianWord);

  el.classList.add('speaking');

  // Highlight paired words on the other side
  const pairedEls = [];
  if (side === 'it') {
    const enIndices = itToEnMaps[si] && itToEnMaps[si][mapIdx];
    if (enIndices) {
      enIndices.forEach(ei => {
        if (wordElements.en[si] && wordElements.en[si][ei]) {
          wordElements.en[si][ei].classList.add('speaking');
          pairedEls.push(wordElements.en[si][ei]);
        }
      });
    }
  } else {
    if (wordElements.it[si] && wordElements.it[si][mapIdx]) {
      wordElements.it[si][mapIdx].classList.add('speaking');
      pairedEls.push(wordElements.it[si][mapIdx]);
    }
  }

  setTimeout(() => {
    el.classList.remove('speaking');
    pairedEls.forEach(p => p.classList.remove('speaking'));
  }, 800);
}

function speakWord(word) {
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  u.lang = 'it-IT';
  u.rate = 0.9;
  setItalianVoice(u);
  window.speechSynthesis.speak(u);
}

function setItalianVoice(utt) {
  const voices = window.speechSynthesis.getVoices();
  const italianVoices = voices.filter(v => v.lang.startsWith('it'));
  const premium = italianVoices.find(v => v.name.includes('Premium') || v.name.includes('Enhanced') || v.name.includes('Google'));
  utt.voice = premium || italianVoices[0] || null;
}

// Ensure voices are loaded
window.speechSynthesis.onvoiceschanged = () => {};

// Event delegation
mainScroll.addEventListener('mouseover', handleWordHover);
mainScroll.addEventListener('mouseout', handleWordLeave);
mainScroll.addEventListener('click', handleWordClick);

// Playback - uses ElevenLabs audio if available, falls back to Web Speech API
function startAudioFrom(offset) {
  // Stop any existing source
  if (audioSource) {
    try { audioSource.stop(); } catch(e) {}
    audioSource = null;
  }

  // Resume AudioContext if suspended (browser autoplay policy)
  if (audioCtx.state === 'suspended') audioCtx.resume();

  audioSource = audioCtx.createBufferSource();
  audioSource.buffer = audioBuffer;
  audioSource.playbackRate.value = speechRate;
  audioSource.connect(audioCtx.destination);
  audioStartCtxTime = audioCtx.currentTime;
  audioStartOffset = offset;
  audioPausedAt = -1;
  audioSource.start(0, offset);

  // Capture reference so onended only acts if this is still the active source
  const thisSource = audioSource;
  audioSource.onended = () => {
    if (audioSource === thisSource && isPlaying && audioPausedAt < 0) {
      isPlaying = false;
      currentStanza = 0;
      updatePlayButton();
      clearSpeakingHighlights();
    }
  };
}

function togglePlay() {
  if (isPlaying) {
    pause();
  } else {
    if (audioLoaded && audioTimings) {
      if (audioPausedAt >= 0) {
        // Resume from where we paused
        isPlaying = true;
        updatePlayButton();
        startAudioFrom(audioPausedAt);
        const gen = ++trackingGen;
        trackAudioWords(gen);
      } else {
        playWithAudio(currentStanza);
      }
    } else {
      if (window.speechSynthesis.paused) {
        window.speechSynthesis.resume();
        isPlaying = true;
        updatePlayButton();
      } else {
        play(currentStanza);
      }
    }
  }
}

function pause() {
  isPlaying = false;
  if (audioSource && audioPausedAt < 0) {
    audioPausedAt = getAudioTime();
    try { audioSource.stop(); } catch(e) {}
    audioSource = null;
  }
  window.speechSynthesis.pause();
  updatePlayButton();
}

function startFromStanza(si) {
  // Stop any existing playback first
  isPlaying = false;
  ++trackingGen; // cancel stale tracking loop
  window.speechSynthesis.cancel();
  if (audioSource) {
    try { audioSource.stop(); } catch(e) {}
    audioSource = null;
  }
  audioPausedAt = -1;
  clearSpeakingHighlights();
  currentStanza = si;
  currentWordIndex = -1;
  if (audioLoaded && audioTimings) {
    playWithAudio(si);
  } else {
    play(si);
  }
}

// ElevenLabs audio playback with word-level sync
function playWithAudio(fromStanza) {
  isPlaying = true;
  currentStanza = fromStanza;
  updatePlayButton();
  scrollToStanza(fromStanza);
  highlightActiveStanza(fromStanza);

  // Seek to the stanza start time
  const stanzaStart = audioTimings.stanzas[fromStanza];
  const offset = stanzaStart ? stanzaStart.startTime : 0;
  startAudioFrom(offset);

  // Cancel any stale tracking loop and start a new one
  const gen = ++trackingGen;
  trackAudioWords(gen);
}

function trackAudioWords(gen) {
  if (!isPlaying || !audioTimings || gen !== trackingGen) return;

  const currentTime = getAudioTime();
  const words = audioTimings.words;

  // Find current word
  clearSpeakingHighlights();
  let foundStanza = -1;
  let foundWordIdx = -1;

  for (let i = 0; i < words.length; i++) {
    if (currentTime >= words[i].start && currentTime < words[i].end) {
      foundStanza = words[i].stanza;
      foundWordIdx = words[i].wordIdx;
      break;
    }
  }

  if (foundStanza >= 0 && foundWordIdx >= 0) {
    if (foundStanza !== currentStanza) {
      currentStanza = foundStanza;
      scrollToStanza(foundStanza);
      highlightActiveStanza(foundStanza);
    }

    if (wordElements.it[foundStanza] && wordElements.it[foundStanza][foundWordIdx]) {
      wordElements.it[foundStanza][foundWordIdx].classList.add('speaking');
    }
    const enIndices = itToEnMaps[foundStanza] && itToEnMaps[foundStanza][foundWordIdx];
    if (enIndices) {
      enIndices.forEach(ei => {
        if (wordElements.en[foundStanza] && wordElements.en[foundStanza][ei]) {
          wordElements.en[foundStanza][ei].classList.add('speaking');
        }
      });
    }
    updateProgress(foundStanza, foundWordIdx + 1);
  }

  if (isPlaying && gen === trackingGen) {
    requestAnimationFrame(() => trackAudioWords(gen));
  }
}

// Web Speech API fallback playback
function play(fromStanza) {
  isPlaying = true;
  currentStanza = fromStanza;
  updatePlayButton();
  speakStanza(fromStanza);
}

function getStanzaWords(si) {
  const words = [];
  STANZAS[si].italian.forEach(line => {
    const tokens = tokenizeLine(line);
    tokens.forEach(token => {
      if (token.isWord) words.push(token.text);
    });
  });
  return words;
}

function speakStanza(si) {
  if (si >= STANZAS.length) {
    isPlaying = false;
    currentStanza = 0;
    updatePlayButton();
    clearSpeakingHighlights();
    return;
  }

  currentStanza = si;
  scrollToStanza(si);
  highlightActiveStanza(si);

  const words = getStanzaWords(si);
  let wordIdx = 0;

  function speakNextWord() {
    if (!isPlaying) {
      clearSpeakingHighlights();
      return;
    }
    if (wordIdx >= words.length) {
      clearSpeakingHighlights();
      speakStanza(si + 1);
      return;
    }

    clearSpeakingHighlights();
    currentWordIndex = wordIdx;

    if (wordElements.it[si] && wordElements.it[si][wordIdx]) {
      wordElements.it[si][wordIdx].classList.add('speaking');
    }
    const enIndices = itToEnMaps[si] && itToEnMaps[si][wordIdx];
    if (enIndices) {
      enIndices.forEach(ei => {
        if (wordElements.en[si] && wordElements.en[si][ei]) {
          wordElements.en[si][ei].classList.add('speaking');
        }
      });
    }
    updateProgress(si, wordIdx + 1);

    utterance = new SpeechSynthesisUtterance(words[wordIdx]);
    utterance.lang = 'it-IT';
    utterance.rate = speechRate;
    setItalianVoice(utterance);

    utterance.onend = () => {
      wordIdx++;
      speakNextWord();
    };

    utterance.onerror = (e) => {
      if (e.error !== 'interrupted' && e.error !== 'canceled') {
        console.error('Speech error:', e);
      }
    };

    window.speechSynthesis.speak(utterance);
  }

  speakNextWord();
}

function clearSpeakingHighlights() {
  document.querySelectorAll('.word.speaking').forEach(el => el.classList.remove('speaking'));
}

function highlightActiveStanza(si) {
  document.querySelectorAll('.stanza-row.active').forEach(el => el.classList.remove('active'));
  const rows = mainScroll.querySelectorAll('.stanza-row');
  if (rows[si]) rows[si].classList.add('active');
}

function scrollToStanza(si) {
  const rows = mainScroll.querySelectorAll('.stanza-row');
  if (rows[si]) {
    const target = rows[si];
    const containerRect = mainScroll.getBoundingClientRect();
    const targetRect = target.getBoundingClientRect();
    const offset = targetRect.top - containerRect.top - containerRect.height / 3;

    mainScroll.scrollBy({ top: offset, behavior: 'smooth' });
  }
}

function updateProgress(stanza, wordInStanza) {
  const totalWords = STANZAS.reduce((sum, s) => sum + s.wordMap.length, 0);
  let wordsBefore = 0;
  for (let i = 0; i < stanza; i++) wordsBefore += STANZAS[i].wordMap.length;
  const progress = ((wordsBefore + wordInStanza) / totalWords) * 100;
  progressBar.style.width = progress + '%';
}

function updatePlayButton() {
  if (isPlaying) {
    playBtn.classList.add('playing');
    playIcon.style.display = 'none';
    pauseIcon.style.display = 'block';
  } else {
    playBtn.classList.remove('playing');
    playIcon.style.display = 'block';
    pauseIcon.style.display = 'none';
  }
}

// Controls
playBtn.addEventListener('click', togglePlay);

document.querySelectorAll('.speed-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    speechRate = parseFloat(btn.dataset.speed);
    if (audioSource && isPlaying) {
      // Recalculate position and restart with new rate
      const pos = getAudioTime();
      startAudioFrom(pos);
    }
  });
});

// Init
buildStanzas();

// Preload voices
if (window.speechSynthesis.getVoices().length === 0) {
  window.speechSynthesis.addEventListener('voiceschanged', () => {});
}
</script>
